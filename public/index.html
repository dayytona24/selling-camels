<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HQ Ranch — Camels for Sale</title>
  <style>
    :root { --sand: #c9a25e; --ink: #2a2420; --muted: #7a6f63; --card: #fff; --bg: #f6f1e7; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: var(--ink); background: var(--bg); }
    header { padding: 2rem 1.25rem; text-align: center; background: linear-gradient(180deg, #efe4cd, var(--bg)); }
    header h1 { margin: 0; font-size: 2rem; letter-spacing: .02em; }
    header p { margin: .4rem 0 0; color: var(--muted); }
    main { max-width: 1080px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }
    .grid { display: grid; gap: 1.25rem; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
    .card { background: var(--card); border-radius: 14px; overflow: hidden; box-shadow: 0 6px 20px rgba(42,36,32,.08); display: flex; flex-direction: column; }
    .card img { width: 100%; height: 180px; object-fit: cover; background: #e7ddca; }
    .card .body { padding: 1rem; display: flex; flex-direction: column; gap: .35rem; flex: 1; }
    .card h2 { margin: 0; font-size: 1.15rem; }
    .badges { display: flex; gap: .4rem; flex-wrap: wrap; }
    .badge { font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; background: #efe4cd; color: #6b5a37; padding: .15rem .5rem; border-radius: 999px; }
    .price { font-weight: 700; color: var(--sand); font-size: 1.1rem; }
    .desc { color: var(--muted); font-size: .9rem; }
    .state { text-align: center; color: var(--muted); padding: 3rem 0; }
  </style>
</head>
<body>
  <header>
    <h1>HQ Ranch</h1>
    <p>Premium dromedary, bactrian &amp; hybrid camels — available now</p>
  </header>
  <main>
    <div id="state" class="state">Loading available camels…</div>
    <div id="grid" class="grid"></div>
  </main>

  <script>
    const CAD = new Intl.NumberFormat('en-CA', { style: 'currency', currency: 'CAD', maximumFractionDigits: 0 });

    function card(c) {
      const img = c.mainImage || (c.additionalImages && c.additionalImages[0]) || '';
      const el = document.createElement('article');
      el.className = 'card';
      el.innerHTML = `
        ${img ? `<img src="${img}" alt="${c.name}" loading="lazy" />` : '<div style="height:180px;background:#e7ddca"></div>'}
        <div class="body">
          <div class="badges">
            <span class="badge">${c.breed}</span>
            <span class="badge">${c.sex}</span>
            ${c.ageYears != null ? `<span class="badge">${c.ageYears} yr</span>` : ''}
          </div>
          <h2>${c.name}</h2>
          <div class="price">${c.priceCad != null ? CAD.format(c.priceCad) : 'Inquire'}</div>
          <p class="desc">${c.shortDescription || ''}</p>
        </div>`;
      return el;
    }

    async function load() {
      const state = document.getElementById('state');
      const grid = document.getElementById('grid');
      try {
        const res = await fetch('/api/camels');
        if (!res.ok) throw new Error('Request failed (' + res.status + ')');
        const camels = await res.json();
        if (!camels.length) { state.textContent = 'No camels available right now — check back soon.'; return; }
        state.style.display = 'none';
        for (const c of camels) grid.appendChild(card(c));
      } catch (err) {
        state.textContent = 'Could not load listings. Please try again later.';
        console.error(err);
      }
    }
    load();
  </script>
</body>
</html>
